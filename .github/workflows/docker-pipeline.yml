name: CI/CD Docker Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Obtener el codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Realizar pruebas unitarias y calcular la metrica
        run: pytest --cov=app test_app.py --cov-report=term

      - name: 5. Mostrar la ejecucion del codigo
        run: python app.py

      - name: 6. Autenticacion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_GAEL }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 7. Construir e insertar imagen en Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tarea-docker:latest
