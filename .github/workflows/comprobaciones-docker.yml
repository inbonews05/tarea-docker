name: Comprobaciones de Compilacion Docker

on:
  push:
    branches: [ "main" ]

jobs:
  docker-checks:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Obtener el codigo
        uses: actions/checkout@v4

      - name: 2. Configurar el motor Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 3. Ejecutar comprobacion con docker/build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false   # "false" indica que es solo comprobacion, no sube nada
          load: false
          tags: test-build:latest

      - name: 4. Ejecutar comprobacion con docker/bake
        uses: docker/bake-action@v5
        with:
          push: false   # "false" indica que es solo comprobacion
          load: false